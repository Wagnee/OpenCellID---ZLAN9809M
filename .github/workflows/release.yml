name: Release IPK

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install checks
        run: sudo apt-get update && sudo apt-get install -y shellcheck lua5.1
      - name: Validate before release
        run: |
          sh -n files/usr/sbin/opencellid-agent
          sh -n files/usr/sbin/opencellid-diagnose
          sh -n files/etc/init.d/opencellid
          sh -n files/etc/uci-defaults/99-opencellid
          sh -n scripts/build-ipk.sh
          sh -n scripts/install-into-rootfs.sh
          sh tests/test-agent.sh
          sh tests/test-rootfs-install.sh
          luac5.1 -p files/usr/lib/lua/luci/controller/opencellid.lua
          luac5.1 -p files/usr/lib/lua/luci/model/cbi/opencellid.lua
          shellcheck -x -e SC3043 files/usr/sbin/opencellid-agent files/usr/sbin/opencellid-diagnose files/etc/init.d/opencellid files/etc/uci-defaults/99-opencellid scripts/build-ipk.sh scripts/install-into-rootfs.sh tests/test-agent.sh tests/test-rootfs-install.sh
      - name: Build IPK
        run: scripts/build-ipk.sh
      - name: Verify tag matches package
        run: test "$GITHUB_REF_NAME" = "v$(sed -n 's/^PKG_VERSION:=//p' Makefile)"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" bin/*.ipk --generate-notes --title "$GITHUB_REF_NAME"
