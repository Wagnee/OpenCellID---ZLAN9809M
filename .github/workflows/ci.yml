name: Validate OpenWrt package

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install checks
        run: sudo apt-get update && sudo apt-get install -y shellcheck lua5.1
      - name: Shell syntax and integration
        run: |
          sh -n files/usr/sbin/opencellid-agent
          sh -n files/usr/sbin/opencellid-diagnose
          sh -n files/etc/init.d/opencellid
          sh -n scripts/build-ipk.sh
          sh -n scripts/build-zlan-sysupgrade.sh
          sh -n scripts/install-into-rootfs.sh
          sh tests/test-agent.sh
          sh tests/test-firmware-build.sh
          sh tests/test-rootfs-install.sh
          luac5.1 -p files/usr/lib/lua/luci/controller/opencellid.lua
          luac5.1 -p files/usr/lib/lua/luci/model/cbi/opencellid.lua
          test "$(sed -n 's/^PKG_VERSION:=//p' Makefile)" = "$(sed -n 's/^VERSION=//p' files/usr/sbin/opencellid-agent)"
      - name: ShellCheck
        run: shellcheck -x -e SC3043 files/usr/sbin/opencellid-agent files/usr/sbin/opencellid-diagnose files/etc/init.d/opencellid files/etc/uci-defaults/99-opencellid scripts/build-ipk.sh scripts/build-zlan-sysupgrade.sh scripts/install-into-rootfs.sh tests/test-agent.sh tests/test-firmware-build.sh tests/test-rootfs-install.sh
      - name: Enforce 1 MB project limit
        run: test "$(du -sb --exclude=.git . | cut -f1)" -le 1048576
      - name: Build architecture-independent IPK
        run: |
          scripts/build-ipk.sh
          test "$(stat -c %s bin/*.ipk)" -le 1048576
          tar -tzf bin/*.ipk | grep -qx './data.tar.gz'
      - uses: actions/upload-artifact@v7
        with:
          name: luci-app-opencellid-mqtt
          path: bin/*.ipk
